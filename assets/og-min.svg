<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="55%" stop-color="#0b1530"/>
      <stop offset="100%" stop-color="#132a55"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .h1 { font: 800 68px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill: #ffffff; letter-spacing: 0.3px; }
      .h2 { font: 600 28px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill: #cbd5e1; }
      .pill { font: 650 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill: #0b1220; }
      .mono { font: 650 18px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; fill:#e2e8f0; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="627" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="627" fill="url(#glow)"/>

  <!-- Abstract "AI" motif: attention grid + nodes -->
  <g opacity="0.55">
    <g stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.55">
      <path d="M120 460 C 250 340, 380 520, 520 390"/>
      <path d="M260 210 C 380 160, 520 240, 660 160"/>
      <path d="M520 520 C 650 420, 820 520, 980 370"/>
      <path d="M760 260 C 860 220, 960 260, 1080 190"/>
    </g>
    <g fill="#e2e8f0" opacity="0.9">
      <circle cx="120" cy="460" r="6"/>
      <circle cx="520" cy="390" r="6"/>
      <circle cx="260" cy="210" r="6"/>
      <circle cx="660" cy="160" r="6"/>
      <circle cx="520" cy="520" r="6"/>
      <circle cx="980" cy="370" r="6"/>
      <circle cx="760" cy="260" r="6"/>
      <circle cx="1080" cy="190" r="6"/>
    </g>
  </g>

  <!-- Soft corner glow blobs -->
  <circle cx="1040" cy="95" r="110" fill="#ff9900" opacity="0.16" filter="url(#soft)"/>
  <circle cx="1085" cy="150" r="170" fill="#60a5fa" opacity="0.14" filter="url(#soft)"/>

  <!-- Minimal top-left pill -->
  <g transform="translate(72,72)">
    <rect x="0" y="0" rx="18" ry="18" width="320" height="44" fill="#ff9900"/>
    <text x="18" y="30" class="pill">AWS AI &amp; ML Scholars</text>
  </g>

  <!-- Main headline (minimal) -->
  <g transform="translate(72,250)">
    <text class="h1" x="0" y="0">AI/ML Study Guide</text>
    <text class="h2" x="0" y="56">Concepts • Definitions • Pitfalls</text>
  </g>

  <!-- Tiny footer label (no URL) -->
  <g transform="translate(72,560)" opacity="0.85">
    <text class="mono" x="0" y="0">Udacity assessment review notes</text>
  </g>
</svg>
